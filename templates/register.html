<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #b11226, #ffffff);
            min-height: 100vh;
        }

        .register-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .register-left {
            background: #b11226;
            color: white;
            padding: 40px;
        }

        .register-left h2 {
            font-weight: bold;
        }

        .register-right {
            padding: 40px;
            background: #fff;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-red {
            background-color: #b11226;
            color: white;
            border-radius: 10px;
        }

        .btn-red:hover {
            background-color: #8e0e1f;
            color: white;
        }

        .login-link a {
            color: #b11226;
            font-weight: 500;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="row w-100" style="max-width: 900px;">
        <div class="col-md-5 register-left d-none d-md-flex flex-column justify-content-center">
            <h2>Welcome!</h2>
            <p class="mt-3">
                Create your account and start shopping premium products with us.
            </p>
        </div>

        <div class="col-md-7 register-right">
            <h3 class="mb-4 text-center text-danger">Create Account</h3>

            <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                {{ form.username }}
            </div>
            <div class="mb-3">
                {{ form.password1 }}
            </div>
            <div class="mb-3">
                {{ form.password2 }}
            </div>

            <!-- Extra Fields -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    {{ form.first_name }}
                </div>
                <div class="col-md-6 mb-3">
                    {{ form.last_name }}
                </div>
            </div>

            <div class="mb-3">
                {{ form.email }}
            </div>

            <div class="mb-3">
                <input type="number" name="age" class="form-control" placeholder="Age">
            </div>

            <div class="mb-4">
                <input type="file" name="picture" class="form-control">
            </div>

            <button type="submit" class="btn btn-red w-100 py-2">
                Register
            </button>
        </form>


            <div class="login-link text-center mt-4">
                Already have an account?
                <a href="{% url 'login' %}">Login</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
