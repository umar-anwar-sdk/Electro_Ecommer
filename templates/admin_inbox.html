<!DOCTYPE html>
<html>
<head>
    <title>Admin Inbox</title>
    <style>
        body { font-family: Arial; }

        ul { padding: 0; }

        li {
            list-style: none;
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        a {
            text-decoration: none;
            color: black;
            display: block;
        }

        li:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<h2>Admin Inbox</h2>

<ul>
    {% for item in user_list %}
        <li>
            <a href="{% url 'admin_chat' item.user.id %}">
                <b>{{ item.user.username }}</b><br>
                <small>{{ item.last_msg }}</small>
            </a>
        </li>
    {% empty %}
        <li>No chats yet</li>
    {% endfor %}
</ul>

</body>
<script>
setInterval(() => {
    location.reload();
}, 5000);
</script>

</html>
